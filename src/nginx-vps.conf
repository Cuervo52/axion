events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Ocultar versión de nginx en headers y páginas de error ──────────────
    server_tokens off;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml
        application/wasm font/woff font/woff2;

    # ── SSL / TLS ─────────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;          # TLSv1.3 gestiona su propio orden
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;          # Mejora forward secrecy

    # ── Rate limiting — zonas compartidas ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=30r/m;

    # ═══════════════════════════════════════════════════════════════════════
    # axisvia.com — Landing principal
    #
    # IMPORTANTE — Cloudflare Flexible SSL:
    #   Cloudflare termina TLS con el usuario y conecta al origen via HTTP
    #   (puerto 80). Si nginx redirigiera 80→443, habría un loop infinito.
    #   Solución: escuchar en ambos puertos y servir contenido en ambos.
    #   El HTTPS al usuario final lo garantiza Cloudflare.
    #
    #   Si se migra a Cloudflare Full/Strict: esta config sigue funcionando
    #   porque también escucha en 443.
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        listen      443 ssl;
        server_name axisvia.com www.axisvia.com;

        ssl_certificate     /etc/letsencrypt/live/axisvia.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/axisvia.com/privkey.pem;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options            "DENY"                                  always;
        add_header X-Content-Type-Options     "nosniff"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
        add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://www.google-analytics.com data: blob:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none';" always;

        root  /var/www/landing;
        index axisvia-legal.html;

        # ── Let's Encrypt challenge ──────────────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── Landing nueva (principal) ────────────────────────────────────────
        location / {
            try_files $uri $uri/ /axisvia-legal.html;
            # 1 hora de cache — suficiente para CDN, permite rollback rápido
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            # Repetir headers de seguridad porque location con add_header
            # no hereda los del server block
            add_header X-Frame-Options            "DENY"                                  always;
            add_header X-Content-Type-Options     "nosniff"                                always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
            add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
            add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
            add_header Content-Security-Policy    "default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://www.google-analytics.com data: blob:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none';" always;
        }

        # ── Landing anterior en /v1/ (segundo plano) ────────────────────────
        location = /v1 {
            return 301 /v1/;
        }

        location /v1/ {
            try_files $uri $uri/ /v1/index.html;
            add_header Cache-Control "public, max-age=3600" always;
            add_header X-Frame-Options            "DENY"                              always;
            add_header X-Content-Type-Options     "nosniff"                            always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
            add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        }

        # ── Blog Ghost ───────────────────────────────────────────────────────
        location /blog {
            proxy_pass         http://ghost:2368;
            proxy_http_version 1.1;
            proxy_set_header   Host              axisvia.com;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Hardcodeado https: Cloudflare Flexible SSL llega en HTTP al origen
            # pero Ghost debe creer que la conexión externa es HTTPS
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  axisvia.com;
            proxy_read_timeout 90;
        }

        # ── Proxy /legal → Next.js ───────────────────────────────────────────
        location /legal {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       'upgrade';
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API via /legal/api → backend Django ─────────────────────────────
        location /legal/api {
            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # legal.axisvia.com — Sistema RAG (Next.js + Django API)
    # Misma estrategia: escucha en 80 y 443 para compatibilidad con
    # Cloudflare Flexible SSL (sin redireccion 80→443).
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        listen      443 ssl;
        server_name legal.axisvia.com;

        ssl_certificate     /etc/letsencrypt/live/axisvia.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/axisvia.com/privkey.pem;

        # ── Security headers para la app ────────────────────────────────────
        add_header X-Frame-Options           "DENY"                                  always;
        add_header X-Content-Type-Options    "nosniff"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"        always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Cache off — la app es dinámica y tiene sesión de usuario
        add_header Cache-Control      "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma             "no-cache"  always;
        add_header Expires            "0"         always;
        add_header Surrogate-Control  "no-store"  always;

        # ── Frontend (Next.js) ───────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       'upgrade';
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Login — rate limit estricto (5 req/min por IP) ──────────────────
        location = /api/auth/login {
            limit_req        zone=login_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        # ── API general — rate limit moderado (30 req/min por IP) ───────────
        location /api {
            limit_req        zone=api_zone burst=20 nodelay;

            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        # ── Admin Django ─────────────────────────────────────────────────────
        location /admin {
            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }
}
