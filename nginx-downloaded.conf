events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml
        application/wasm font/woff font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=30r/m;

    # ═══════════════════════════════════════════════════════════════════════
    # axisvia.com — Landing principal (HTTP-only temporal)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        server_name axisvia.com www.axisvia.com;

        add_header X-Frame-Options            "DENY"                                  always;
        add_header X-Content-Type-Options     "nosniff"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
        add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy    "default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://www.google-analytics.com data: blob:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none';" always;

        root  /var/www/landing;
        index axisvia-legal.html;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            try_files $uri $uri/ /axisvia-legal.html;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Frame-Options            "DENY"                                  always;
            add_header X-Content-Type-Options     "nosniff"                                always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
            add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
            add_header Content-Security-Policy    "default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://www.google-analytics.com data: blob:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none';" always;
        }

        location = /v1 {
            return 301 /v1/;
        }

        location /v1/ {
            try_files $uri $uri/ /v1/index.html;
            add_header Cache-Control "public, max-age=3600" always;
            add_header X-Frame-Options            "DENY"                              always;
            add_header X-Content-Type-Options     "nosniff"                            always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        }

        location /blog {
            proxy_pass         http://ghost:2368;
            proxy_http_version 1.1;
            proxy_set_header   Host              axisvia.com;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto http;
            proxy_set_header   X-Forwarded-Host  axisvia.com;
            proxy_read_timeout 90;
        }

        location /legal {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       'upgrade';
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /legal/api {
            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # legal.axisvia.com — Sistema RAG (HTTP-only temporal)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        server_name legal.axisvia.com;

        add_header X-Frame-Options           "DENY"                                  always;
        add_header X-Content-Type-Options    "nosniff"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"        always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

        add_header Cache-Control      "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma             "no-cache"  always;
        add_header Expires            "0"         always;

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       'upgrade';
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location = /api/auth/login {
            limit_req        zone=login_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        location /api {
            limit_req        zone=api_zone burst=20 nodelay;

            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        location /admin {
            proxy_pass        http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header  Host             $host;
            proxy_set_header  X-Real-IP        $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # axion.axisvia.com — SaaS de Torneos
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        server_name axion.axisvia.com;

        # Opcional si ya tienes SSL en la estructura:
        # listen      443 ssl;
        # ssl_certificate     /etc/letsencrypt/live/axisvia.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/axisvia.com/privkey.pem;

        client_max_body_size 50M;

        location / {
            proxy_pass http://172.18.0.1:3005;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
